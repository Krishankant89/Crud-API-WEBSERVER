services:
  api:
    image: crud-api-webserver:${APP_VERSION:-1.0.0}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-crud-api-webserver}
    ports:
      - "${PORT:-5000}:5000"
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-sqlite:///students.db}
    volumes:
      - ./instance:/app/instance
    restart: unless-stopped
